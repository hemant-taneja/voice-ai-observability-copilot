name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voice-ai-copilot

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voice_copilot_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: voice-ai-copilot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Backend tests
        run: npm run test -w backend

      - name: Frontend tests
        run: npm run test -w frontend

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCE VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_VM_IP }}
          username: ${{ secrets.GCE_VM_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/voice-ai-observability-copilot
            git pull origin main
            cd voice-ai-copilot
            npm ci
            VITE_API_BASE_URL="" npm run build -w frontend
            docker compose build
            docker compose up -d
            echo "Waiting for services to be healthy..."
            sleep 20
            docker compose exec -T app node dist/db/migrate.js
            echo "Deploy complete."
